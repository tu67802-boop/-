<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العودة إلى الله</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #000; color: #fff; text-align: center; padding: 20px; margin: 0; user-select: none; }
        
        /* القسم العلوي للأذكار */
        .top-dhikr { color: #ffd700; font-size: 1.1rem; margin-bottom: 5px; font-weight: bold; }
        .middle-dhikr { color: #e0e0e0; font-size: 0.9rem; margin-bottom: 5px; line-height: 1.5; }
        .mahdi-text { color: #4caf50; font-size: 0.9rem; margin-bottom: 15px; opacity: 0.9; }
        
        /* اسم التطبيق الجديد */
        .main-app-title { font-size: 2rem; color: #ffffff; margin: 20px 0; font-weight: bold; border-bottom: 2px solid #333; padding-bottom: 10px; }

        /* المربع الإحصائي الكلي */
        .total-box { background: #1a1a1a; padding: 15px; border-radius: 15px; margin: 10px auto; width: 85%; border: 1px solid #444; position: relative; }
        .edit-icon { position: absolute; top: 10px; left: 10px; cursor: pointer; color: #ffd700; font-size: 0.7rem; border: 1px solid #ffd700; padding: 2px 6px; border-radius: 5px; }
        .total-title { color: #aaa; font-size: 0.8rem; }
        .total-number { color: #ffd700; font-size: 1.6rem; font-weight: bold; }

        /* العداد الحالي */
        .counter-number { font-size: 7.5rem; font-weight: bold; color: #2e7d32; line-height: 1; margin: 15px 0; }
        .counter-label { color: #888; font-size: 1.1rem; margin-bottom: 25px; }
        
        /* الأزرار */
        .btn { width: 95%; max-width: 400px; padding: 18px; font-size: 1.2rem; font-weight: bold; border: none; border-radius: 15px; margin: 8px 0; cursor: pointer; transition: 0.3s; }
        .btn-success { background-color: #27ae60; color: white; }
        .btn-success:disabled { background-color: #1b5e20; color: #888; cursor: not-allowed; }
        .btn-danger { background-color: #c62828; color: white; }
        
        /* صندوق الآيات والروايات */
        .quote-box { background-color: #111; border-right: 5px solid #ffd700; padding: 20px; border-radius: 10px; margin: 25px auto; width: 90%; text-align: right; line-height: 1.6; min-height: 80px; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="top-dhikr">بسم الله الرحمن الرحيم</div>
    <div class="middle-dhikr">استغفر الله واتوب اليه ولا حول ولا قوة الا بالله العلي العظيم</div>
    <div class="top-dhikr">اللهم صل على محمد وآل محمد</div>
    <div class="mahdi-text">المذنبين جرحى في جيش صاحب الزمان</div>

    <!-- تم إعادة الاسم هنا وبشكل بارز -->
    <div class="main-app-title">العودة إلى الله</div>
    
    <div class="total-box">
        <div class="total-title">إجمالي أيام العودة (السجل التاريخي)</div>
        <div id="totalDays" class="total-number">0</div>
        <span class="edit-icon" onclick="editTotalDays()">تعديل ✎</span>
    </div>

    <div class="counter-number" id="currentDays">0</div>
    <div class="counter-label">يوماً من الثبات الحالي</div>

    <button class="btn btn-success" id="recordBtn" onclick="recordSuccess()">سجل ثباتك اليوم</button>
    <button class="btn btn-danger" onclick="resetCounter()">حدث ذنب (تصفير الحالي)</button>

    <div class="quote-box" id="quote">جارٍ تحميل الحكمة...</div>

    <script>
        const quotes = [
            "آية: (قُلْ يَا عِبَادِيَ الَّذِينَ أَسْرَفُوا عَلَى أَنْفُسِهِمْ لَا تَقْنَطُوا مِنْ رَحْمَةِ اللَّهِ)",
            "رواية: عن النبي (ص): 'التائب من الذنب كمن لا ذنب له'.",
            "رواية: قال الإمام الصادق (ع): 'إن الله يفرح بتوبة عبده المؤمن إذا تاب'.",
            "آية: (إِنَّ اللَّهَ يُحِبُّ التَّوَّابِينَ وَيُحِبُّ الْمُتَطَهِّرِينَ)",
            "رواية: قال الإمام علي (ع): 'تعطروا بالاستغفار، لا تفضحنكم روائح الذنوب'.",
            "رواية: عن الإمام الباقر (ع): 'التائب من الذنب كالمقيم عليه وهو مستغفر منه كالمستهزئ'.",
            "آية: (وَهُوَ الَّذِي يَقْبَلُ التَّوْبَةَ عَنْ عِبَادِهِ وَيَعْفُو عَنِ السَّيِّئَاتِ)"
        ];

        function init() {
            let current = localStorage.getItem('currentCount') || 0;
            let total = localStorage.getItem('totalCount') || 0;
            let lastVisit = localStorage.getItem('lastVisit');
            let lastRecordDate = localStorage.getItem('lastRecordDate');
            
            const now = new Date();
            const todayStr = now.toLocaleDateString();

            if (lastVisit) {
                const diffHours = (now - new Date(lastVisit)) / (1000 * 60 * 60);
                if (diffHours > 24) {
                    current = 0;
                    localStorage.setItem('currentCount', 0);
                    alert("نعتذر، غبت لأكثر من 24 ساعة؛ تم تصفير العداد الحالي للثبات.");
                }
            }

            localStorage.setItem('lastVisit', now.toISOString());

            if (lastRecordDate === todayStr) {
                document.getElementById('recordBtn').disabled = true;
                document.getElementById('recordBtn').innerText = "تم تسجيل ثبات اليوم ✅";
            }

            document.getElementById('currentDays').innerText = current;
            document.getElementById('totalDays').innerText = total;
            document.getElementById('quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];
        }

        function editTotalDays() {
            let newTotal = prompt("أدخل الرقم الجديد لإجمالي أيام العودة:", localStorage.getItem('totalCount') || 0);
            if (newTotal !== null && !isNaN(newTotal)) {
                localStorage.setItem('totalCount', parseInt(newTotal));
                location.reload();
            }
        }

        function recordSuccess() {
            let current = parseInt(localStorage.getItem('currentCount')) || 0;
            let total = parseInt(localStorage.getItem('totalCount')) || 0;
            current++; total++;
            localStorage.setItem('currentCount', current);
            localStorage.setItem('totalCount', total);
            localStorage.setItem('lastRecordDate', new Date().toLocaleDateString());
            location.reload();
        }

        function resetCounter() {
            if (confirm("هل تريد تصفير العداد الحالي؟ (سيبقى سجلك الكلي محفوظاً)")) {
                localStorage.setItem('currentCount', 0);
                localStorage.removeItem('lastRecordDate');
                location.reload();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
