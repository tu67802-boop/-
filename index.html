<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق التوبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #000000;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
            user-select: none;
        }
        .header { color: #ffd700; font-size: 1.1rem; margin-top: 10px; }
        .mahdi { color: #4caf50; font-size: 0.9rem; margin-bottom: 20px; opacity: 0.9; line-height: 1.4; }
        .main-title { font-size: 1.8rem; margin-bottom: 5px; color: #e0e0e0; }
        .counter-number {
            font-size: 7rem;
            font-weight: bold;
            color: #2e7d32;
            line-height: 1;
            margin: 15px 0;
        }
        .counter-label { color: #888; font-size: 1.1rem; margin-bottom: 25px; }
        .btn {
            width: 95%;
            max-width: 400px;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            margin: 8px 0;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-success { background-color: #27ae60; color: white; }
        .btn-success:disabled { background-color: #1b5e20; color: #888; cursor: not-allowed; opacity: 0.6; }
        .btn-danger { background-color: #c62828; color: white; }
        .btn-warning { background-color: #f39c12; color: white; }
        .quote-box {
            background-color: #111;
            border-right: 5px solid #ffd700;
            padding: 20px;
            border-radius: 10px;
            margin: 25px auto;
            width: 90%;
            max-width: 400px;
            text-align: right;
            font-size: 1.05rem;
            line-height: 1.6;
        }
        #status-msg { color: #ffd700; font-weight: bold; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div class="header">اللهم صل على محمد وآل محمد</div>
    <div class="mahdi">المذنبين جرحى في جيش الإمام المهدي عجل الله فرجه</div>

    <div class="main-title">تطبيق التوبة</div>
    
    <div class="counter-number" id="days">0</div>
    <div class="counter-label">يوماً من الثبات والتقوى</div>

    <div id="status-msg">✨ تم تسجيل ثباتك لهذا اليوم! عد غداً.</div>
    <button class="btn btn-success" id="recordBtn" onclick="recordSuccess()">سجل ثباتك اليوم</button>
    <button class="btn btn-danger" onclick="resetCounter()">حدث ذنب (تصفير العداد)</button>
    <button class="btn btn-warning" onclick="requestNotify()">تفعيل التنبيهات 🔔</button>

    <div class="quote-box" id="quote">جارٍ تحميل الرواية...</div>
    <div style="font-size: 0.8rem; color: #444;" id="start-date">تاريخ البدء: --</div>

    <script>
        const quotes = [
            "عن الإمام الصادق (ع): 'إن الله يفرح بتوبة عبده المؤمن إذا تاب'.",
            "قال رسول الله (ص): 'التائب من الذنب كمن لا ذنب له'.",
            "قال الإمام علي (ع): 'لا وجع أوجع للقلوب من الذنوب'.",
            "آية: (إِنَّ اللَّهَ يُحِبُّ التَّوَّابِينَ وَيُحِبُّ الْمُتَطَهِّرِينَ)",
            "عن الإمام الباقر (ع): 'التائب من الذنب كمن لا ذنب له والمقيم على الذنب وهو مستغفر منه كالمستهزئ'."
        ];

        function init() {
            let count = localStorage.getItem('count') || 0;
            let startDate = localStorage.getItem('startDate') || new Date().toLocaleDateString();
            let lastVisit = localStorage.getItem('lastVisit');
            let lastRecordDate = localStorage.getItem('lastRecordDate');
            
            const now = new Date();
            const todayStr = now.toLocaleDateString();

            // فحص الـ 24 ساعة (التصفير الصارم)
            if (lastVisit) {
                const lastVisitTime = new Date(lastVisit);
                const diffInHours = (now - lastVisitTime) / (1000 * 60 * 60);

                if (diffInHours > 24) { 
                    count = 0;
                    startDate = todayStr;
                    localStorage.setItem('count', 0);
                    localStorage.setItem('startDate', todayStr);
                    localStorage.removeItem('lastRecordDate');
                    alert("نعتذر، مر أكثر من 24 ساعة دون دخولك. تم تصفير العداد!");
                }
            }

            // حفظ وقت الدخول الحالي
            localStorage.setItem('lastVisit', now.toISOString());

            // قفل الزر إذا تم التسجيل اليوم
            if (lastRecordDate === todayStr) {
                document.getElementById('recordBtn').disabled = true;
                document.getElementById('recordBtn').innerText = "تم تسجيل ثبات اليوم ✅";
                document.getElementById('status-msg').style.display = "block";
            }

            document.getElementById('days').innerText = count;
            document.getElementById('start-date').innerText = "تاريخ البدء: " + startDate;
            document.getElementById('quote').innerText = quotes[Math.floor(Math.random() * quotes.length)];
        }

        function recordSuccess() {
            const todayStr = new Date().toLocaleDateString();
            let count = parseInt(localStorage.getItem('count')) || 0;
            
            count++;
            localStorage.setItem('count', count);
            localStorage.setItem('lastRecordDate', todayStr);
            localStorage.setItem('lastVisit', new Date().toISOString()); // تحديث وقت الزيارة عند الضغط
            
            alert("أحسنتم! تم تسجيل يوم جديد في ميزان ثباتكم.");
            location.reload();
        }

        function resetCounter() {
            if (confirm("هل تريد تصفير العداد والبدء من جديد؟")) {
                localStorage.setItem('count', 0);
                localStorage.setItem('startDate', new Date().toLocaleDateString());
                localStorage.removeItem('lastRecordDate');
                location.reload();
            }
        }

        function requestNotify() {
            Notification.requestPermission().then(p => {
                if (p === "granted") alert("التنبيهات مفعلة.");
            });
        }

        window.onload = init;
    </script>
</body>
</html>
