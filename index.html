<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>العودة إلى الله</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #000; color: #fff; text-align: center; padding: 20px; margin: 0; }
        .top-dhikr { color: #ffd700; font-size: 1.1rem; margin-bottom: 5px; font-weight: bold; }
        .middle-dhikr { color: #e0e0e0; font-size: 0.9rem; margin-bottom: 5px; }
        .mahdi-text { color: #4caf50; font-size: 0.9rem; margin-bottom: 20px; }
        
        .total-box { background: #1a1a1a; padding: 15px; border-radius: 15px; margin: 10px auto; width: 85%; border: 1px solid #444; position: relative; }
        .edit-icon { position: absolute; top: 10px; left: 10px; cursor: pointer; color: #ffd700; font-size: 0.8rem; border: 1px solid #ffd700; padding: 2px 8px; border-radius: 5px; }
        
        .counter-number { font-size: 7rem; font-weight: bold; color: #2e7d32; margin: 10px 0; }
        .btn { width: 95%; max-width: 400px; padding: 15px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 15px; margin: 8px 0; cursor: pointer; }
        .btn-success { background-color: #27ae60; color: white; }
        .btn-danger { background-color: #c62828; color: white; }
    </style>
</head>
<body>

    <div class="top-dhikr">بسم الله الرحمن الرحيم</div>
    <div class="middle-dhikr">استغفر الله واتوب اليه ولا حول ولا قوة الا بالله</div>
    <div class="top-dhikr">اللهم صل على محمد وآل محمد</div>
    <div class="mahdi-text">المذنبين جرحى في جيش صاحب الزمان</div>

    <div class="total-box">
        <div style="color: #aaa; font-size: 0.8rem;">إجمالي أيام العودة (السجل التاريخي)</div>
        <div class="total-number" id="totalDays" style="font-size: 1.5rem; font-weight: bold; color: #ffd700;">0</div>
        <!-- زر التعديل -->
        <span class="edit-icon" onclick="editTotalDays()">تعديل ✎</span>
    </div>

    <div class="counter-number" id="currentDays">0</div>
    <div style="color: #888; margin-bottom: 20px;">يوماً من الثبات الحالي</div>

    <button class="btn btn-success" id="recordBtn" onclick="recordSuccess()">سجل ثباتك اليوم</button>
    <button class="btn btn-danger" onclick="resetCounter()">حدث ذنب (تصفير الحالي)</button>

    <script>
        function init() {
            let current = localStorage.getItem('currentCount') || 0;
            let total = localStorage.getItem('totalCount') || 0;
            
            document.getElementById('currentDays').innerText = current;
            document.getElementById('totalDays').innerText = total;

            // قفل الزر اليومي
            if (localStorage.getItem('lastRecordDate') === new Date().toLocaleDateString()) {
                document.getElementById('recordBtn').disabled = true;
                document.getElementById('recordBtn').innerText = "تم تسجيل ثبات اليوم ✅";
            }
        }

        // دالة التعديل اليدوي
        function editTotalDays() {
            let newTotal = prompt("أدخل عدد أيام العودة الكلي الجديد:", localStorage.getItem('totalCount') || 0);
            if (newTotal !== null) {
                localStorage.setItem('totalCount', newTotal);
                location.reload();
            }
        }

        function recordSuccess() {
            let current = parseInt(localStorage.getItem('currentCount')) || 0;
            let total = parseInt(localStorage.getItem('totalCount')) || 0;
            current++; total++;
            localStorage.setItem('currentCount', current);
            localStorage.setItem('totalCount', total);
            localStorage.setItem('lastRecordDate', new Date().toLocaleDateString());
            location.reload();
        }

        function resetCounter() {
            if (confirm("هل تريد تصفير العداد الحالي؟")) {
                localStorage.setItem('currentCount', 0);
                location.reload();
            }
        }

        window.onload = init;
    </script>
</body>
</html>
